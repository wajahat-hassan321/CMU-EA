<!DOCTYPE html>
<html>
<head>

    <title>Email Status</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .card{
            width:500px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:20px;
            padding:45px;
            text-align:center;
            color:white;
            box-shadow:0 10px 40px rgba(0,0,0,0.2);
        }

        .icon{
            font-size:70px;
            margin-bottom:20px;
        }

        h1{
            font-size:32px;
            margin-bottom:15px;
        }

        .subtitle{
            color:#dbeafe;
            margin-bottom:35px;
            font-size:15px;
        }

        .stats{
            display:flex;
            gap:20px;
            margin-bottom:35px;
        }

        .box{
            flex:1;
            padding:25px;
            border-radius:15px;
            background: rgba(255,255,255,0.12);
        }

        .box h2{
            font-size:40px;
            margin-bottom:10px;
        }

        .success{
            border:2px solid #22c55e;
        }

        .failed{
            border:2px solid #ef4444;
        }

        .label{
            font-size:14px;
            color:#e5e7eb;
        }

        .btn{
            display:inline-block;
            padding:14px 28px;
            background:white;
            color:#1e3a8a;
            text-decoration:none;
            border-radius:12px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

    <div class="card">

        <div class="icon">
            📧
        </div>

        <h1>Email Process Completed</h1>

        <div class="subtitle">
            Complaint notification process finished successfully
        </div>

        <div class="stats">

            <div class="box success">
                <h2>{{ success }}</h2>

                <div class="label">
                    Emails Sent
                </div>
            </div>

            <div class="box failed">
                <h2>{{ failed }}</h2>

                <div class="label">
                    Failed Emails
                </div>
            </div>

        </div>

        <a href="/" class="btn">
            Upload More Complaints
        </a>

    </div>

</body>
</html>
